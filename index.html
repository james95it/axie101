<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axie Master Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e11;
            color: #eaecef;
            margin: 0;
            padding: 30px 15px;
            min-height: 100vh;
        }
        .dashboard-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .dashboard-title {
            color: #f0b90b;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .wallets-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
        }
        .wallet-card {
            background-color: #181a20;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid #232830;
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, border-color 0.2s;
        }
        .wallet-card:hover {
            transform: translateY(-5px);
            border-color: #00c2ff;
        }
        .wallet-name {
            font-size: 20px;
            font-weight: bold;
            color: #00c2ff;
            margin-bottom: 5px;
            text-align: center;
        }
        .wallet-address {
            font-family: monospace;
            font-size: 13px;
            color: #929aa5;
            background-color: #2b3139;
            padding: 6px 10px;
            border-radius: 6px;
            word-break: break-all;
            margin-bottom: 15px;
            text-align: center;
        }
        
        /* Khu vực Tài sản */
        .assets-section {
            background-color: #1e2329;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .section-title {
            font-size: 12px;
            color: #929aa5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            border-bottom: 1px solid #2b3139;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .asset-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .asset-item:last-child {
            margin-bottom: 0;
            padding-bottom: 8px;
            border-bottom: 1px dashed #3a414a;
        }
        .total-usd-item {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-weight: bold;
            font-size: 16px;
            color: #0dbb72;
        }
        .asset-name {
            font-weight: bold;
            width: 50px;
        }
        .slp-text { color: #ffa3ce; }
        .axs-text { color: #0055d4; }
        .ron-text { color: #1e88e5; }
        .weth-text { color: #9c9c9c; }
        
        .asset-numbers {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .asset-value {
            font-family: monospace;
            font-size: 15px;
            color: #fff;
        }
        .usd-value {
            font-family: monospace;
            font-size: 12px;
            color: #929aa5;
        }

        /* Khu vực Bounty */
        .bounty-badge {
            background-color: rgba(240, 185, 11, 0.1);
            color: #f0b90b;
            border: 1px solid rgba(240, 185, 11, 0.3);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bounty-info {
            display: flex;
            flex-direction: column;
        }
        .bounty-value {
            font-size: 22px;
            font-weight: bold;
        }
        .bounty-rank {
            font-size: 13px;
            color: #eaecef;
            margin-top: 3px;
        }
        
        button {
            background-color: #00c2ff;
            color: #000;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
            color: #999;
        }
    </style>
</head>
<body>

<div class="dashboard-header">
    <div class="dashboard-title">Trạm Quản Lý Axie Tổng Hợp</div>
    <button onclick="updateDashboard()" id="refreshBtn">Cập nhật toàn bộ</button>
</div>

<div class="wallets-list" id="walletsList">
    </div>

<script>
    // --- CẤU HÌNH API ---
    const graphqlUrl = "https://graphql-gateway.axieinfinity.com/graphql";
    const roninRpcUrl = "https://api.roninchain.com/rpc"; 
    
    // Hợp đồng Token mạng Ronin
    const SLP_CONTRACT = "0xa8754b9fa15fc18bb59458815510e40a12cd2014";
    const AXS_CONTRACT = "0x97a9107c1793bc408eaa158ceb5a836eb15091a1";
    const WETH_CONTRACT = "0xc99a6a985ed2cac1ef41640596c5a5f9f4e19ef5";

    // ==========================================
    // KHU VỰC DANH SÁCH VÍ CỦA BẠN 
    // ==========================================
    const wallets = [
        { 
            name: "Momo", 
            address: "0x7f23fba89336a1b6cf7d58c88e5acd6656d59b5a",
            token: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjFlZjIwY2U3LWJlOTgtNjIwNS1iNWJiLTU1NDFjYjE3ODk4NCIsInNpZCI6MjM3MTgzMDUzLCJyb2xlcyI6WyJ1c2VyIl0sInNjcCI6WyJhbGwiXSwiYWN0aXZhdGVkIjp0cnVlLCJhY3QiOnRydWUsInJvbmluQWRkcmVzcyI6IjB4N2YyM2ZiYTg5MzM2YTFiNmNmN2Q1OGM4OGU1YWNkNjY1NmQ1OWI1YSIsImV4cCI6MTc4MTQxMzA2MiwiaWF0IjoxNzgwMjAzNDYyLCJpc3MiOiJBeGllSW5maW5pdHkiLCJzdWIiOiIxZWYyMGNlNy1iZTk4LTYyMDUtYjViYi01NTQxY2IxNzg5ODQifQ.5snsD35R3Wxu3mNWnYdJtFL1rqKKTxYQmS9S_R3vq5U" 
        },
        { 
            name: "James1", 
            address: "0x39fac7a74365c188c293bd9a064323b50e63cde7",
            token: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjFlZjVmMGMyLWVhZTItNmYwOS04YTY0LTQ3Yjk3MzExODU2NiIsInNpZCI6MjQwNjkyMjg5LCJyb2xlcyI6WyJ1c2VyIl0sInNjcCI6WyJhbGwiXSwiYWN0aXZhdGVkIjp0cnVlLCJhY3QiOnRydWUsInJvbmluQWRkcmVzcyI6IjB4MzlmYWM3YTc0MzY1YzE4OGMyOTNiZDlhMDY0MzIzYjUwZTYzY2RlNyIsImV4cCI6MTc4MTQxNjM4NCwiaWF0IjoxNzgwMjA2Nzg0LCJpc3MiOiJBeGllSW5maW5pdHkiLCJzdWIiOiIxZWY1ZjBjMi1lYWUyLTZmMDktOGE2NC00N2I5NzMxMTg1NjYifQ.c7_w-BJwZl_63qnO_GWNm64Aga6eeIS_fgUec2g3tro" 
        }
    ];

    // --- 1. LẤY TỶ GIÁ TỪ COINGECKO ---
    async function fetchLivePrices() {
        try {
            const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ronin,smooth-love-potion,axie-infinity,ethereum&vs_currencies=usd");
            const data = await res.json();
            return {
                ron: data['ronin']?.usd || 0,
                slp: data['smooth-love-potion']?.usd || 0,
                axs: data['axie-infinity']?.usd || 0,
                weth: data['ethereum']?.usd || 0 // Dùng giá ETH cho WETH
            };
        } catch (error) {
            console.error("Lỗi lấy giá:", error);
            return { ron: 0, slp: 0, axs: 0, weth: 0 }; // Trả về 0 nếu API lỗi
        }
    }

    // --- 2. LẤY TÀI SẢN (RON, SLP, AXS, WETH) ---
    async function fetchAssets(address) {
        try {
            const cleanAddress = address.toLowerCase().replace("0x", "");
            const balanceDataParam = "0x70a08231" + "000000000000000000000000" + cleanAddress;

            const [ronRes, slpRes, axsRes, wethRes] = await Promise.all([
                fetch(roninRpcUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc:"2.0", method:"eth_getBalance", params:[address, "latest"], id:1}) }),
                fetch(roninRpcUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc:"2.0", method:"eth_call", params:[{to: SLP_CONTRACT, data: balanceDataParam}, "latest"], id:2}) }),
                fetch(roninRpcUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc:"2.0", method:"eth_call", params:[{to: AXS_CONTRACT, data: balanceDataParam}, "latest"], id:3}) }),
                fetch(roninRpcUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc:"2.0", method:"eth_call", params:[{to: WETH_CONTRACT, data: balanceDataParam}, "latest"], id:4}) })
            ]);

            const ronData = await ronRes.json();
            const slpData = await slpRes.json();
            const axsData = await axsRes.json();
            const wethData = await wethRes.json();

            const ron = ronData.result && ronData.result !== "0x" ? (parseInt(ronData.result, 16) / 1e18) : 0;
            const slp = slpData.result && slpData.result !== "0x" ? parseInt(slpData.result, 16) : 0;
            const axs = axsData.result && axsData.result !== "0x" ? (parseInt(axsData.result, 16) / 1e18) : 0;
            const weth = wethData.result && wethData.result !== "0x" ? (parseInt(wethData.result, 16) / 1e18) : 0;

            return { ron, slp, axs, weth };
        } catch (error) {
            return { ron: 0, slp: 0, axs: 0, weth: 0 };
        }
    }

    // --- 3. LẤY ĐIỂM BOUNTY VÀ RANK ---
    async function fetchBountyData(address, authToken) {
        if(!authToken || authToken.includes("ĐOẠN_MÃ_TOKEN")) return { bp: "Thiếu Token", rank: "---" };

        const rawBody = JSON.stringify({
            operationName: "GetQuestsSeasonStatsAndUserRank",
            variables: { user: address, includeUserRank: true, leaderboardType: "WeeklyPremierQuestPoints" },
            query: `query GetQuestsSeasonStatsAndUserRank($leaderboardType: LeaderboardType!, $user: String!, $includeUserRank: Boolean!) {\n  leaderboard(type: $leaderboardType) {\n    totalParticipants\n    totalScore\n    __typename\n  }\n  userLeaderboardRank(user: $user, type: $leaderboardType) @include(if: $includeUserRank) {\n    rank\n    score\n    details\n    user\n    __typename\n  }\n}\n`
        });

        try {
            const response = await fetch(graphqlUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": authToken },
                body: rawBody
            });
            const data = await response.json();
            
            if (data.errors) return { bp: "Sai Token", rank: "---" };
            
            const userData = data.data?.userLeaderboardRank;
            return userData 
                ? { bp: userData.score ?? 0, rank: userData.rank ?? "Chưa có" }
                : { bp: 0, rank: "Chưa xếp hạng" };
        } catch (error) {
            return { bp: "Lỗi mạng", rank: "Lỗi mạng" };
        }
    }

    // --- 4. CẬP NHẬT GIAO DIỆN ---
    async function updateDashboard() {
        const listEl = document.getElementById("walletsList");
        const btn = document.getElementById("refreshBtn");
        
        btn.innerText = "Đang lấy dữ liệu...";
        btn.disabled = true;
        listEl.innerHTML = "";

        // Lấy tỷ giá USD một lần duy nhất lúc bắt đầu để web chạy nhanh
        const prices = await fetchLivePrices();

        for (const wallet of wallets) {
            const card = document.createElement("div");
            card.className = "wallet-card";
            card.innerHTML = `
                <div class="wallet-name">${wallet.name}</div>
                <div class="wallet-address">${wallet.address.substring(0,6)}...${wallet.address.slice(-4)}</div>
                
                <div class="assets-section">
                    <div class="section-title"><span>Tài sản ví</span></div>
                    <div style="text-align:center; padding:10px 0; color:#929aa5;">Đang tải...</div>
                </div>
            `;
            listEl.appendChild(card);

            const [assets, bountyData] = await Promise.all([
                fetchAssets(wallet.address),
                fetchBountyData(wallet.address, wallet.token)
            ]);

            // Tính toán giá trị ra USD
            const ronUsd = assets.ron * prices.ron;
            const slpUsd = assets.slp * prices.slp;
            const axsUsd = assets.axs * prices.axs;
            const wethUsd = assets.weth * prices.weth;
            const totalUsd = ronUsd + slpUsd + axsUsd + wethUsd;

            // In dữ liệu ra thẻ
            card.innerHTML = `
                <div class="wallet-name">${wallet.name}</div>
                <div class="wallet-address" title="${wallet.address}">${wallet.address.substring(0,6)}...${wallet.address.slice(-4)}</div>
                
                <div class="assets-section">
                    <div class="section-title"><span>Tài sản ví</span></div>
                    
                    <div class="asset-item">
                        <span class="asset-name ron-text">RON</span>
                        <div class="asset-numbers">
                            <span class="asset-value">${assets.ron.toFixed(3)}</span>
                            <span class="usd-value">~$${ronUsd.toFixed(2)}</span>
                        </div>
                    </div>
                    
                    <div class="asset-item">
                        <span class="asset-name slp-text">SLP</span>
                        <div class="asset-numbers">
                            <span class="asset-value">${assets.slp.toLocaleString()}</span>
                            <span class="usd-value">~$${slpUsd.toFixed(2)}</span>
                        </div>
                    </div>
                    
                    <div class="asset-item">
                        <span class="asset-name axs-text">AXS</span>
                        <div class="asset-numbers">
                            <span class="asset-value">${assets.axs.toFixed(3)}</span>
                            <span class="usd-value">~$${axsUsd.toFixed(2)}</span>
                        </div>
                    </div>

                    <div class="asset-item">
                        <span class="asset-name weth-text">WETH</span>
                        <div class="asset-numbers">
                            <span class="asset-value">${assets.weth.toFixed(4)}</span>
                            <span class="usd-value">~$${wethUsd.toFixed(2)}</span>
                        </div>
                    </div>

                    <div class="total-usd-item">
                        <span>Tổng quy đổi:</span>
                        <span>$${totalUsd.toFixed(2)}</span>
                    </div>
                </div>

                <div class="bounty-badge">
                    <div class="bounty-info">
                        <span class="section-title" style="border:none; margin:0; padding:0; color:#f0b90b;">Điểm Nhiệm Vụ</span>
                        <span class="bounty-rank">Hạng: ${bountyData.rank}</span>
                    </div>
                    <span class="bounty-value">${bountyData.bp}</span>
                </div>
            `;
        }

        btn.innerText = "Cập nhật toàn bộ";
        btn.disabled = false;
    }

    // Chạy ngay khi tải xong file
    window.onload = updateDashboard;
</script>

</body>
</html>
