<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axie Master Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e11;
            color: #eaecef;
            margin: 0;
            padding: 30px 15px;
            min-height: 100vh;
        }
        .dashboard-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .dashboard-title {
            color: #f0b90b;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .wallets-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
        }
        .wallet-card {
            background-color: #181a20;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid #232830;
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, border-color 0.2s;
        }
        .wallet-card:hover {
            transform: translateY(-5px);
            border-color: #00c2ff;
        }
        .wallet-name {
            font-size: 20px;
            font-weight: bold;
            color: #00c2ff;
            margin-bottom: 5px;
            text-align: center;
        }
        .wallet-address {
            font-family: monospace;
            font-size: 13px;
            color: #929aa5;
            background-color: #2b3139;
            padding: 6px 10px;
            border-radius: 6px;
            word-break: break-all;
            margin-bottom: 15px;
            text-align: center;
        }
        
        /* Khu vực Tài sản */
        .assets-section {
            background-color: #1e2329;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .section-title {
            font-size: 12px;
            color: #929aa5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            border-bottom: 1px solid #2b3139;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .asset-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .total-usd-item {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px dashed #3a414a;
            font-weight: bold;
            font-size: 16px;
            color: #fff;
        }
        .asset-name { font-weight: bold; width: 50px; }
        .slp-text { color: #ffa3ce; }
        .axs-text { color: #0055d4; }
        .ron-text { color: #1e88e5; }
        .weth-text { color: #9c9c9c; }
        
        .asset-numbers {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .asset-value {
            font-family: monospace;
            font-size: 15px;
            color: #fff;
        }
        .usd-value {
            font-family: monospace;
            font-size: 12px;
            color: #929aa5;
        }

        /* Khu vực Thống kê Chênh lệch */
        .diff-section {
            background-color: rgba(13, 187, 114, 0.05);
            border: 1px solid rgba(13, 187, 114, 0.2);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .diff-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 5px;
            font-family: monospace;
        }
        .diff-row:last-child { margin-bottom: 0; }
        .diff-total {
            text-align: right;
            font-weight: bold;
            font-size: 15px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(13, 187, 114, 0.2);
        }
        .text-green { color: #0dbb72; }
        .text-red { color: #f6465d; }
        .text-gray { color: #929aa5; font-style: italic; font-size: 12px; text-align: center; }

        /* Khu vực Bounty */
        .bounty-badge {
            background-color: rgba(240, 185, 11, 0.1);
            color: #f0b90b;
            border: 1px solid rgba(240, 185, 11, 0.3);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bounty-info { display: flex; flex-direction: column; }
        .bounty-value { font-size: 22px; font-weight: bold; }
        .bounty-rank { font-size: 13px; color: #eaecef; margin-top: 3px; }
        
        button {
            background-color: #00c2ff;
            color: #000;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background-color: #555; cursor: not-allowed; color: #999; }
    </style>
</head>

    // --- HÀM TÍNH TOÁN NGÀY THỨ 5 GẦN NHẤT ---
    function getRecentThursday() {
        const d = new Date();
        d.setHours(0, 0, 0, 0);
        const day = d.getDay(); 
        const diff = day >= 4 ? day - 4 : day + 3;
        d.setDate(d.getDate() - diff);
        return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; 
    }

    // --- HÀM XỬ LÝ LƯU TRỮ VÀ SO SÁNH (LOCAL STORAGE) ---
    function processFarmingDiff(address, currentAssets) {
        const currentCycleId = getRecentThursday();
        const storageKey = 'axie_history_' + address.toLowerCase();
        let history = JSON.parse(localStorage.getItem(storageKey));

        if (!history) {
            history = {
                lastCycle: null,
                currentCycle: { id: currentCycleId, ...currentAssets }
            };
        } else {
            if (history.currentCycle.id !== currentCycleId) {
                history.lastCycle = history.currentCycle; 
                history.currentCycle = { id: currentCycleId, ...currentAssets }; 
            } else {
                history.currentCycle = { id: currentCycleId, ...currentAssets };
            }
        }
        
        localStorage.setItem(storageKey, JSON.stringify(history));

        if (!history.lastCycle) return null;

        return {
            ron: currentAssets.ron - history.lastCycle.ron,
            slp: currentAssets.slp - history.lastCycle.slp,
            axs: currentAssets.axs - history.lastCycle.axs,
            weth: currentAssets.weth - history.lastCycle.weth
        };
    }

    function renderDiffRow(name, val, colorClass, decimals) {
        if (Math.abs(val) < 0.0001) return ''; 
        const sign = val > 0 ? "+" : "";
        const valClass = val > 0 ? "text-green" : "text-red";
        const formattedVal = val.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: decimals });
        
        return `
            <div class="diff-row">
                <span class="${colorClass}">${name}</span>
                <span class="${valClass}">${sign}${formattedVal}</span>
            </div>
        `;
    }

    // --- CÁC HÀM FETCH DỮ LIỆU ---
    async function fetchLivePrices() {
        try {
            const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ronin,smooth-love-potion,axie-infinity,ethereum&vs_currencies=usd");
            const data = await res.json();
            return {
                ron: data['ronin']?.usd || 0,
                slp: data['smooth-love-potion']?.usd || 0,
                axs: data['axie-infinity']?.usd || 0,
                weth: data['ethereum']?.usd || 0
            };
        } catch (e) { return { ron: 0, slp: 0, axs: 0, weth: 0 }; }
    }

    async function fetchAssets(address) {
        try {
            const cleanAddress = address.toLowerCase().replace("0x", "");
            const balanceDataParam = "0x70a08231" + "000000000000000000000000" + cleanAddress;

            const [ronRes, slpRes, axsRes, wethRes] = await Promise.all([
                fetch(roninRpcUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc:"2.0", method:"eth_getBalance", params:[address, "latest"], id:1}) }),
                fetch(roninRpcUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc:"2.0", method:"eth_call", params:[{to: SLP_CONTRACT, data: balanceDataParam}, "latest"], id:2}) }),
                fetch(roninRpcUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc:"2.0", method:"eth_call", params:[{to: AXS_CONTRACT, data: balanceDataParam}, "latest"], id:3}) }),
                fetch(roninRpcUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc:"2.0", method:"eth_call", params:[{to: WETH_CONTRACT, data: balanceDataParam}, "latest"], id:4}) })
            ]);

            const ronData = await ronRes.json();
            const slpData = await slpRes.json();
            const axsData = await axsRes.json();
            const wethData = await wethRes.json();

            return {
                ron: ronData.result && ronData.result !== "0x" ? (parseInt(ronData.result, 16) / 1e18) : 0,
                slp: slpData.result && slpData.result !== "0x" ? parseInt(slpData.result, 16) : 0,
                axs: axsData.result && axsData.result !== "0x" ? (parseInt(axsData.result, 16) / 1e18) : 0,
                weth: wethData.result && wethData.result !== "0x" ? (parseInt(wethData.result, 16) / 1e18) : 0
            };
        } catch (e) { return { ron: 0, slp: 0, axs: 0, weth: 0 }; }
    }

    async function fetchBountyData(address, authToken) {
        if(!authToken) return { bp: "Thiếu Token", rank: "---" };
        const rawBody = JSON.stringify({
            operationName: "GetQuestsSeasonStatsAndUserRank",
            variables: { user: address, includeUserRank: true, leaderboardType: "WeeklyPremierQuestPoints" },
            query: `query GetQuestsSeasonStatsAndUserRank($leaderboardType: LeaderboardType!, $user: String!, $includeUserRank: Boolean!) {\n  leaderboard(type: $leaderboardType) {\n    totalParticipants\n    totalScore\n    __typename\n  }\n  userLeaderboardRank(user: $user, type: $leaderboardType) @include(if: $includeUserRank) {\n    rank\n    score\n    details\n    user\n    __typename\n  }\n}\n`
        });
        try {
            const res = await fetch(graphqlUrl, { method: "POST", headers: { "Content-Type": "application/json", "Authorization": authToken }, body: rawBody });
            const data = await res.json();
            if (data.errors) return { bp: "Sai Token", rank: "---" };
            const u = data.data?.userLeaderboardRank;
            return u ? { bp: u.score ?? 0, rank: u.rank ?? "Chưa có" } : { bp: 0, rank: "Chưa xếp hạng" };
        } catch (e) { return { bp: "Lỗi mạng", rank: "Lỗi mạng" }; }
    }

                    renderDiffRow("AXS", diffStats.axs, "axs-text", 3) +

                            <div class="diff-total ${diffUsdClass}">${diffUsdSign}$${diffUsd.toFixed(2)}</div>

                    `;
                }
            }

            card.innerHTML = `

                <div class="assets-section">
                    <div class="section-title"><span>Tổng tài sản hiện tại</span></div>
                    
                    <div class="asset-item">
                        <span class="asset-name ron-text">RON</span>
                        <div class="asset-numbers">
                            <span class="asset-value">${assets.ron.toFixed(3)}</span>
                            <span class="usd-value">~$${(assets.ron * prices.ron).toFixed(2)}</span>
                        </div>
                    </div>
                    
                    <div class="asset-item">
                        <span class="asset-name slp-text">SLP</span>
                        <div class="asset-numbers">
                            <span class="asset-value">${assets.slp.toLocaleString()}</span>
                            <span class="usd-value">~$${(assets.slp * prices.slp).toFixed(2)}</span>
                        </div>
                    </div>
                    
                    <div class="asset-item">
                        <span class="asset-name axs-text">AXS</span>
                        <div class="asset-numbers">
                            <span class="asset-value">${assets.axs.toFixed(3)}</span>
                            <span class="usd-value">~$${(assets.axs * prices.axs).toFixed(2)}</span>
                        </div>
                    </div>

                    <div class="asset-item">
                        <span class="asset-name weth-text">WETH</span>
                        <div class="asset-numbers">
                            <span class="asset-value">${assets.weth.toFixed(4)}</span>
                            <span class="usd-value">~$${(assets.weth * prices.weth).toFixed(2)}</span>
                        </div>
                    </div>

                    <div class="total-usd-item">
                        <span>Tổng quy đổi:</span>
                        <span style="color:#0dbb72;">$${totalUsd.toFixed(2)}</span>
                    </div>
                </div>

                ${diffHtml}

                <div class="bounty-badge">
                    <div class="bounty-info">
                        <span class="section-title" style="border:none; margin:0; padding:0; color:#f0b90b;">Điểm Nhiệm Vụ</span>
                        <span class="bounty-rank">Hạng: ${bountyData.rank}</span>
                    </div>
                    <span class="bounty-value">${bountyData.bp}</span>
                </div>
            `;
        }

        btn.innerText = "Cập nhật toàn bộ";
        btn.disabled = false;
    }

    window.onload = updateDashboard;
</script>

</body>
</html>
