<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axie Bounty Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #f3c623;
            margin-bottom: 30px;
        }
        #dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .wallet-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            width: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .wallet-card:hover {
            transform: translateY(-5px);
            border-color: #f3c623;
        }
        .wallet-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #4da6ff;
            margin-bottom: 10px;
        }
        .wallet-address {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 15px;
            word-break: break-all;
        }
        .bounty-badge {
            background-color: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #f3c623;
        }
        .bounty-badge span:first-child {
            color: #aaa;
            font-size: 0.9em;
        }
        .bounty-value {
            font-weight: bold;
            color: #fff;
            font-size: 1.1em;
        }
        .loading {
            text-align: center;
            color: #aaa;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>🚀 Bảng Điều Khiển Nhiệm Vụ Axie</h1>
    
    <div id="dashboard">
        <div class="loading">Đang kết nối tới máy chủ Sky Mavis...</div>
    </div>

    <script>
        // --- CẤU HÌNH DỮ LIỆU ---
        const graphqlUrl = "https://graphql-gateway.axieinfinity.com/graphql";
        
        // ⚠️ LƯU Ý QUAN TRỌNG: Mã Token này có thời hạn. 
        // Nếu sau này web báo "Lỗi API", bạn cần lấy Token mới đè vào đây.
        const authToken = "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjFlZjIwY2U3LWJlOTgtNjIwNS1iNWJiLTU1NDFjYjE3ODk4NCIsInNpZCI6MjM3MTgzMDUzLCJyb2xlcyI6WyJ1c2VyIl0sInNjcCI6WyJhbGwiXSwiYWN0aXZhdGVkIjp0cnVlLCJhY3QiOnRydWUsInJvbmluQWRkcmVzcyI6IjB4N2YyM2ZiYTg5MzM2YTFiNmNmN2Q1OGM4OGU1YWNkNjY1NmQ1OWI1YSIsImV4cCI6MTc4MTQxMzA2MiwiaWF0IjoxNzgwMjAzNDYyLCJpc3MiOiJBeGllSW5maW5pdHkiLCJzdWIiOiIxZWYyMGNlNy1iZTk4LTYyMDUtYjViYi01NTQxY2IxNzg5ODQifQ.5snsD35R3Wxu3mNWnYdJtFL1rqKKTxYQmS9S_R3vq5U";

        // Danh sách các ví bạn muốn theo dõi (Thêm ví khác vào đây)
        const wallets = [
        { name: "James1", address: "0x39fac7a74365c188c293bd9a064323b50e63cde7" },
        { name: "Mono", address: "0x7f23fba89336a1b6cf7d58c88e5acd6656d59b5a" },
        { name: "Randy", address: "0x7ca6b3a5d9ec0ba2ba00298aa67b768d9bbf7e01" }
    ];

        // --- HÀM LẤY DỮ LIỆU TỪ AXIE ---
        async function fetchBountyData(address) {
            const rawBody = JSON.stringify({
                operationName: "GetQuestsSeasonStatsAndUserRank",
                variables: { 
                    user: address, 
                    includeUserRank: true, 
                    leaderboardType: "WeeklyPremierQuestPoints" 
                },
                query: `query GetQuestsSeasonStatsAndUserRank($leaderboardType: LeaderboardType!, $user: String!, $includeUserRank: Boolean!) {\n  leaderboard(type: $leaderboardType) {\n    totalParticipants\n    totalScore\n    __typename\n  }\n  userLeaderboardRank(user: $user, type: $leaderboardType) @include(if: $includeUserRank) {\n    rank\n    score\n    details\n    user\n    __typename\n  }\n}\n`
            });

            try {
                const response = await fetch(graphqlUrl, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": authToken
                    },
                    body: rawBody
                });
                const data = await response.json();
                
                if (data.errors) {
                    console.error(`Lỗi API cho ví ${address}:`, data.errors);
                    return { bp: "Lỗi API", rank: "---" };
                }
                
                const userData = data.data?.userLeaderboardRank;
                if (userData) {
                    return { 
                        bp: userData.score ?? 0, 
                        rank: userData.rank ?? "Chưa có" 
                    };
                }
                
                return { bp: 0, rank: "Chưa xếp hạng" };
                
            } catch (error) {
                console.error(`Lỗi mạng khi lấy dữ liệu ${address}:`, error);
                return { bp: "Lỗi mạng", rank: "Lỗi mạng" };
            }
        }

        // --- HÀM XỬ LÝ GIAO DIỆN ---
        async function updateDashboard() {
            const dashboard = document.getElementById("dashboard");
            dashboard.innerHTML = ""; // Xóa chữ "Đang tải"

            for (const wallet of wallets) {
                // Tạo khung cho từng ví
                const card = document.createElement("div");
                card.className = "wallet-card";
                
                // Hiển thị thông tin chờ (Đang tải...)
                card.innerHTML = `
                    <div class="wallet-name">${wallet.name}</div>
                    <div class="wallet-address">${wallet.address.substring(0, 8)}...${wallet.address.substring(38)}</div>
                    <div class="bounty-badge">
                        <span>Bounty (Tuần)</span>
                        <span class="bounty-value">Đang tải...</span>
                    </div>
                `;
                dashboard.appendChild(card);

                // Gọi API lấy dữ liệu thực tế
                const bountyData = await fetchBountyData(wallet.address);

                // Cập nhật lại khung ví sau khi có dữ liệu
                card.innerHTML = `
                    <div class="wallet-name">${wallet.name}</div>
                    <div class="wallet-address">${wallet.address.substring(0, 8)}...${wallet.address.substring(38)}</div>
                    <div class="bounty-badge">
                        <span>Bounty (Tuần)</span>
                        <span class="bounty-value">${bountyData.bp} BP | Hạng ${bountyData.rank}</span>
                    </div>
                `;
            }
        }

        // Chạy hàm ngay khi trang tải xong
        document.addEventListener("DOMContentLoaded", updateDashboard);
    </script>
</body>
</html>
