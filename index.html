    function getRecentThursday() {
        const d = new Date();
        d.setHours(0, 0, 0, 0);
        const day = d.getDay(); 
        const diff = day >= 4 ? day - 4 : day + 3;
        d.setDate(d.getDate() - diff);
        return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; 
    }

    // Logic tính điểm 10h15 - Xử lý cả trường hợp token lỗi
    function getDailyStats(address, currentBp) {
        let bpNum = parseInt(currentBp);
        if (isNaN(bpNum)) return { tracked: false, start: 0, current: 0, gain: 0, warned: false };

        const d = new Date();
        // Lùi ngày nếu chưa qua 10h15
        if (d.getHours() < 10 || (d.getHours() === 10 && d.getMinutes() < 15)) {
            d.setDate(d.getDate() - 1);
        }
        
        const dailyCycleId = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}_10h15`;
        const storageKey = 'axie_daily_tracker_v3_' + address.toLowerCase(); // Đổi key để dọn data cũ bị kẹt
        let history = JSON.parse(localStorage.getItem(storageKey));

        // Cập nhật mốc mới nếu qua ngày
        if (!history || history.dailyCycleId !== dailyCycleId) {
            history = { dailyCycleId: dailyCycleId, startBp: bpNum };
            localStorage.setItem(storageKey, JSON.stringify(history));
        }

        // Đề phòng trường hợp reset mùa, điểm tụt xuống
        if (bpNum < history.startBp) {
            history.startBp = bpNum;
            localStorage.setItem(storageKey, JSON.stringify(history));
        }

        const gain = bpNum - history.startBp;
        return { 
            tracked: true,
            start: history.startBp,
            current: bpNum,
            gain: gain, 
            warned: gain === 0 
        };
    }

    function processFarmingDiff(address, currentAssets) {
        const currentCycleId = getRecentThursday();
        const storageKey = 'axie_history_' + address.toLowerCase();
        let history = JSON.parse(localStorage.getItem(storageKey));

        if (!history) {
            history = { lastCycle: null, currentCycle: { id: currentCycleId, ...currentAssets } };
        } else {
            if (history.currentCycle.id !== currentCycleId) {
                history.lastCycle = history.currentCycle; 
                history.currentCycle = { id: currentCycleId, ...currentAssets }; 
            } else {
                history.currentCycle = { id: currentCycleId, ...currentAssets };
            }
        }
        
        localStorage.setItem(storageKey, JSON.stringify(history));
        if (!history.lastCycle) return null;

        return {
            ron: currentAssets.ron - history.lastCycle.ron,
            slp: currentAssets.slp - history.lastCycle.slp,
            axs: currentAssets.axs - history.lastCycle.axs,
            weth: currentAssets.weth - history.lastCycle.weth
        };
    }

    function renderDiffRow(name, val, colorClass, decimals) {
        if (Math.abs(val) < 0.0001) return ''; 
        const sign = val > 0 ? "+" : "";
        const valClass = val > 0 ? "text-green" : "text-red";
        const formattedVal = val.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: decimals });
        return `<div class="diff-row"><span class="${colorClass}">${name}</span><span class="${valClass}">${sign}${formattedVal}</span></div>`;
    }

    async function fetchLivePrices() {
        try {
            const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ronin,smooth-love-potion,axie-infinity,ethereum&vs_currencies=usd");
            const data = await res.json();
            return {
                ron: data['ronin']?.usd || 0,
                slp: data['smooth-love-potion']?.usd || 0,
                axs: data['axie-infinity']?.usd || 0,
                weth: data['ethereum']?.usd || 0
            };
        } catch (e) { return { ron: 0, slp: 0, axs: 0, weth: 0 }; }
    }

    function hexToDec(hexStr, decimals) {
        if (!hexStr || hexStr === "0x" || hexStr === "0x0") return 0;
        try {
            return Number(BigInt(hexStr)) / Math.pow(10, decimals);
        } catch(e) { return 0; }
    }

    async function fetchAssets(address) {
        try {
            const cleanAddress = address.toLowerCase().replace("0x", "");
            const balanceDataParam = "0x70a08231" + "000000000000000000000000" + cleanAddress;

            const [ronRes, slpRes, axsRes, wethRes, stakedAxsRes] = await Promise.all([
                fetch(roninRpcUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc:"2.0", method:"eth_getBalance", params:[address, "latest"], id:1}) }),
                fetch(roninRpcUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc:"2.0", method:"eth_call", params:[{to: SLP_CONTRACT, data: balanceDataParam}, "latest"], id:2}) }),
                fetch(roninRpcUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc:"2.0", method:"eth_call", params:[{to: AXS_CONTRACT, data: balanceDataParam}, "latest"], id:3}) }),
                fetch(roninRpcUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc:"2.0", method:"eth_call", params:[{to: WETH_CONTRACT, data: balanceDataParam}, "latest"], id:4}) }),
                fetch(roninRpcUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc:"2.0", method:"eth_call", params:[{to: STAKED_AXS_CONTRACT, data: balanceDataParam}, "latest"], id:5}) })
            ]);

            const ronData = await ronRes.json();
            const slpData = await slpRes.json();
            const axsData = await axsRes.json();
            const wethData = await wethRes.json();
            const stakedAxsData = await stakedAxsRes.json();

            const totalAxs = hexToDec(axsData.result, 18) + hexToDec(stakedAxsData.result, 18);

            return {
                ron: hexToDec(ronData.result, 18),
                slp: hexToDec(slpData.result, 0),
                axs: totalAxs,
                weth: hexToDec(wethData.result, 18)
            };
        } catch (e) { return { ron: 0, slp: 0, axs: 0, weth: 0 }; }
    }

    async function fetchBountyData(address, authToken) {
        if(!authToken) return { bp: "---", rank: "---" };
        const rawBody = JSON.stringify({
            operationName: "GetQuestsSeasonStatsAndUserRank",
            variables: { user: address, includeUserRank: true, leaderboardType: "WeeklyPremierQuestPoints" },
            query: `query GetQuestsSeasonStatsAndUserRank($leaderboardType: LeaderboardType!, $user: String!, $includeUserRank: Boolean!) {\n  leaderboard(type: $leaderboardType) {\n    totalParticipants\n    totalScore\n    __typename\n  }\n  userLeaderboardRank(user: $user, type: $leaderboardType) @include(if: $includeUserRank) {\n    rank\n    score\n    details\n    user\n    __typename\n  }\n}\n`
        });
        try {
            const res = await fetch(graphqlUrl, { method: "POST", headers: { "Content-Type": "application/json", "Authorization": authToken }, body: rawBody });
            const data = await res.json();
            if (data.errors) return { bp: "Sai Token", rank: "Lỗi Token" };
            const u = data.data?.userLeaderboardRank;
            return u ? { bp: u.score ?? 0, rank: u.rank ?? "Chưa có" } : { bp: 0, rank: "Chưa xếp hạng" };
        } catch (e) { return { bp: "Lỗi mạng", rank: "Lỗi mạng" }; }
    }

    async function updateDashboard() {
        const listEl = document.getElementById("walletsList");
        const btn = document.getElementById("refreshBtn");
        const summarySection = document.getElementById("summarySection");
        const warningSection = document.getElementById("warningSection");
        const grandTotalValueEl = document.getElementById("grandTotalValue");
        const grandTotalDiffValueEl = document.getElementById("grandTotalDiffValue");
        
        btn.innerText = "Đang lấy dữ liệu...";
        btn.disabled = true;
        listEl.innerHTML = "";
        summarySection.style.display = "none";
        warningSection.style.display = "none";

        let grandTotalUsd = 0;
        let grandTotalDiffUsd = 0;
        let hasAtLeastOneDiffData = false;
        let forgottenWallets = [];

        const prices = await fetchLivePrices();

        for (const wallet of wallets) {
            const card = document.createElement("div");
            card.className = "wallet-card";
            listEl.appendChild(card);

            const [assets, bountyData] = await Promise.all([
                fetchAssets(wallet.address),
                fetchBountyData(wallet.address, wallet.token)
            ]);

            const totalUsd = (assets.ron * prices.ron) + (assets.slp * prices.slp) + (assets.axs * prices.axs) + (assets.weth * prices.weth);
            grandTotalUsd += totalUsd;

            const diffStats = processFarmingDiff(wallet.address, assets);
            let diffHtml = "";

            if (!diffStats) {
                diffHtml = `<div class="diff-section"><div class="text-gray">Chưa đủ dữ liệu tuần trước để so sánh.<br>Hệ thống đã lưu mốc hôm nay.</div></div>`;
            } else {
                hasAtLeastOneDiffData = true;
                const diffUsd = (diffStats.ron * prices.ron) + (diffStats.slp * prices.slp) + (diffStats.axs * prices.axs) + (diffStats.weth * prices.weth);
                grandTotalDiffUsd += diffUsd; 

                const diffUsdClass = diffUsd > 0 ? "text-green" : (diffUsd < 0 ? "text-red" : "");
                const diffUsdSign = diffUsd > 0 ? "+" : "";

                const rowsHtml = 
                    renderDiffRow("SLP", diffStats.slp, "slp-text", 0) +
                    renderDiffRow("RON", diffStats.ron, "ron-text", 3) +
                    renderDiffRow("AXS", diffStats.axs, "axs-text", 3) +
                    renderDiffRow("WETH", diffStats.weth, "weth-text", 4);

                if (rowsHtml === "") {
                    diffHtml = `<div class="diff-section"><div class="text-gray">Tài sản không thay đổi so với tuần trước.</div></div>`;
                } else {
                    diffHtml = `
                        <div class="diff-section">
                            <div class="section-title" style="border:none; margin-bottom:5px;"><span>Tiến độ từ Thứ 5</span></div>
                            ${rowsHtml}
                            <div class="diff-total ${diffUsdClass}">${diffUsdSign}$${diffUsd.toFixed(2)}</div>
                        </div>
                    `;
                }
            }

            // Lấy thông tin điểm 10h15 và Hiện tại
            const dailyStats = getDailyStats(wallet.address, bountyData.bp);
            if (dailyStats.warned) {
                forgottenWallets.push(wallet.name);
            }
            
            const badgeClass = dailyStats.warned ? "bounty-badge warning-badge" : "bounty-badge";
            const badgeTitleColor = dailyStats.warned ? "#f6465d" : "#f0b90b";
            
            // Xây dựng giao diện hiển thị rõ ràng 2 mốc điểm
            let dailyGainHtml = "";
            if (dailyStats.tracked) {
                dailyGainHtml = `
                    <div class="daily-gain-container">
                        <div class="daily-row">
                            <span>Mốc 10:15:</span>
                            <span class="daily-val">${dailyStats.start} BP</span>
                        </div>
                        <div class="daily-row">
                            <span>Hiện tại:</span>
                            <span class="daily-val">${dailyStats.current} BP</span>
                        </div>
                        <div class="daily-row" style="margin-top: 10px;">
                            <span style="font-size: 14px; font-weight: bold;">Tiến độ đã cày:</span>
                            <span class="${dailyStats.gain > 0 ? 'gain-badge' : 'zero-badge'}">
                                ${dailyStats.gain > 0 ? '+' + dailyStats.gain : '0'} BP
                            </span>
                        </div>
                        ${dailyStats.warned ? '<div class="daily-alert">⚠️ ĐIỂM CHƯA NHẢY - HÃY VÀO LÀM NHIỆM VỤ!</div>' : ''}
                    </div>
                `;
            } else {
                dailyGainHtml = `<div class="daily-alert" style="color: #929aa5; border-color: #555; background: #222; animation: none;">Không lấy được điểm (Token hết hạn/Lỗi mạng)</div>`;
            }

            card.innerHTML = `
                <div class="wallet-name">${wallet.name}</div>
                <div class="wallet-address" title="${wallet.address}">${wallet.address.substring(0,6)}...${wallet.address.slice(-4)}</div>
                
                <div class="assets-section">
                    <div class="section-title"><span>Tổng tài sản hiện tại</span></div>
                    
                    <div class="asset-item">
                        <span class="asset-name ron-text">RON</span>
                        <div class="asset-numbers">
                            <span class="asset-value">${assets.ron.toFixed(3)}</span>
                            <span class="usd-value">~$${(assets.ron * prices.ron).toFixed(2)}</span>
                        </div>
                    </div>
                    
                    <div class="asset-item">
                        <span class="asset-name slp-text">SLP</span>
                        <div class="asset-numbers">
                            <span class="asset-value">${assets.slp.toLocaleString()}</span>
                            <span class="usd-value">~$${(assets.slp * prices.slp).toFixed(2)}</span>
                        </div>
                    </div>
                    
                    <div class="asset-item">
                        <span class="asset-name axs-text">AXS</span>
                        <div class="asset-numbers">
                            <span class="asset-value">${assets.axs.toFixed(3)}</span>
                            <span class="usd-value">~$${(assets.axs * prices.axs).toFixed(2)}</span>
                        </div>
                    </div>

                    <div class="asset-item">
                        <span class="asset-name weth-text">WETH</span>
                        <div class="asset-numbers">
                            <span class="asset-value">${assets.weth.toFixed(4)}</span>
                            <span class="usd-value">~$${(assets.weth * prices.weth).toFixed(2)}</span>
                        </div>
                    </div>

                    <div class="total-usd-item">
                        <span>Tổng quy đổi:</span>
                        <span style="color:#0dbb72;">$${totalUsd.toFixed(2)}</span>
                    </div>
                </div>

                ${diffHtml}

                <div class="${badgeClass}">
                    <div class="bounty-main">
                        <div class="bounty-info">
                            <span class="section-title" style="border:none; margin:0; padding:0; color:${badgeTitleColor};">Điểm Nhiệm Vụ</span>
                            <span class="bounty-rank">Hạng: ${bountyData.rank}</span>
                        </div>
                        <span class="bounty-value" style="color: ${badgeTitleColor}">${bountyData.bp}</span>
                    </div>
                    ${dailyGainHtml}
                </div>
            `;
        }

        grandTotalValueEl.innerText = `$${grandTotalUsd.toFixed(2)}`;
        
        if (!hasAtLeastOneDiffData) {
            grandTotalDiffValueEl.className = "text-gray";
            grandTotalDiffValueEl.innerText = "Chưa đủ dữ liệu tuần trước";
        } else {
            const grandSign = grandTotalDiffUsd > 0 ? "+" : "";
            const grandClass = grandTotalDiffUsd > 0 ? "text-green" : (grandTotalDiffUsd < 0 ? "text-red" : "text-gray");
            grandTotalDiffValueEl.className = grandClass;
            grandTotalDiffValueEl.style.fontWeight = "bold";
            grandTotalDiffValueEl.style.fontFamily = "monospace";
            grandTotalDiffValueEl.innerText = `${grandSign}$${grandTotalDiffUsd.toFixed(2)}`;
        }
        
        summarySection.style.display = "block";

        if (forgottenWallets.length > 0) {
            warningSection.innerHTML = `🚨 <b>CẢNH BÁO:</b> Phát hiện các ví chưa cày điểm từ mốc 10h15 sáng nay: <br><span style="color:#fff; font-size:16px; display:inline-block; margin-top:5px;"><b>${forgottenWallets.join(" • ")}</b></span>`;
            warningSection.style.display = "block";
        }

        btn.innerText = "Cập nhật toàn bộ";
        btn.disabled = false;
    }

    window.onload = updateDashboard;
</script>
