name: Axie Auto Snapshot Bot
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Chạy Bot
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          TOKEN_MOMO: ${{ secrets.TOKEN_MOMO }}
          TOKEN_JAMES1: ${{ secrets.TOKEN_JAMES1 }}
          TOKEN_CRYSITE: ${{ secrets.TOKEN_CRYSITE }}
          TOKEN_CODY: ${{ secrets.TOKEN_CODY }}
          TOKEN_RANDY: ${{ secrets.TOKEN_RANDY }}
          TOKEN_OMI: ${{ secrets.TOKEN_OMI }}
          TOKEN_POKEMON: ${{ secrets.TOKEN_POKEMON }}
          TOKEN_LOKI: ${{ secrets.TOKEN_LOKI }}
        run: node bot.js
